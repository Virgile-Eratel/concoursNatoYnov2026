<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadAid — Lecture par laser</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --text: #1b2430;
      --muted: #6b7787;
      --border: #e3e8ee;
      --border-strong: #cdd5df;
      --primary: #1f2a37;
      --primary-hover: #2c3a4b;
      --laser: #19c37d;
      --laser-soft: rgba(25, 195, 125, .15);
      --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: var(--surface);
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--laser);
      display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 15px; }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: -.2px; }
    header h1 small { color: var(--muted); font-weight: 400; margin-left: 6px; }
    .status { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); transition: background .3s; }
    .dot.live { background: var(--laser); }
    .dot.busy { background: #e0a106; }
    .dot.err  { background: #e0414f; }

    main {
      display: grid; grid-template-columns: 1.4fr 1fr; gap: 22px;
      padding: 24px 28px; max-width: 1400px; margin: 0 auto;
    }
    @media (max-width: 920px) { main { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }

    .video-wrap {
      position: relative; background: #0d1117; border-radius: 12px; overflow: hidden;
      aspect-ratio: 4 / 3; border: 1px solid var(--border);
    }
    video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* zone non lue (sous le laser) assombrie */
    .mask-below {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(13,17,23,.55); pointer-events: none;
      backdrop-filter: grayscale(.6);
    }
    /* le laser */
    .laser {
      position: absolute; left: 0; right: 0; height: 0;
      border-top: 2px solid var(--laser);
      box-shadow: 0 0 10px 1px rgba(25,195,125,.8);
      cursor: ns-resize; touch-action: none;
    }
    .laser::before {
      content: "Zone lue ▲"; position: absolute; right: 10px; top: -24px;
      background: var(--laser); color: #fff; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 5px; white-space: nowrap;
    }
    .laser .grip {
      position: absolute; left: 50%; top: -7px; transform: translateX(-50%);
      width: 46px; height: 14px; border-radius: 8px; background: var(--laser);
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .laser .grip::after {
      content: ""; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
      width: 18px; height: 2px; background: rgba(255,255,255,.85);
      box-shadow: 0 -3px 0 rgba(255,255,255,.85), 0 3px 0 rgba(255,255,255,.85);
    }

    .controls { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
    .btn {
      font-family: inherit; font-size: 14px; font-weight: 500; line-height: 1;
      padding: 10px 16px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border-strong); background: var(--surface); color: var(--text);
      box-shadow: var(--shadow); transition: background .15s, border-color .15s, opacity .15s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn:hover { background: #f8fafc; border-color: var(--muted); }
    .btn:active { background: #f1f4f7; }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn.toggle-on { background: var(--laser-soft); border-color: var(--laser); color: #0f7a4d; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    select.btn { padding-right: 30px; }

    .progress { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 14px; }
    .progress > div { height: 100%; width: 0; background: var(--laser); transition: width .15s; }

    .panel { padding: 20px; display: flex; flex-direction: column; }
    .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 12px; font-weight: 600; }
    .result {
      flex: 1; background: #fbfcfd; border: 1px solid var(--border); border-radius: 9px;
      padding: 16px; font-size: 16px; line-height: 1.6; white-space: pre-wrap;
      overflow-y: auto; min-height: 260px; color: var(--text);
    }
    .result:empty::before { content: "Le texte au-dessus du laser apparaîtra ici…"; color: var(--muted); }
    .meta { margin-top: 12px; font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
    .settings { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px; font-size: 12px; color: var(--muted); align-items: center; }
    .settings input { font-family: inherit; font-size: 12px; padding: 7px 9px; border: 1px solid var(--border-strong); border-radius: 7px; color: var(--text); background: var(--surface); }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark">R</div>
      <h1>ReadAid <small>Lecture par laser · OCR local</small></h1>
    </div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Caméra arrêtée</span>
    </div>
  </header>

  <main>
    <section>
      <div class="video-wrap card" id="stage">
        <video id="video" autoplay playsinline muted></video>
        <div class="mask-below" id="mask"></div>
        <div class="laser" id="laser"><span class="grip"></span></div>
      </div>

      <div class="controls">
        <button class="btn primary" id="startBtn">Démarrer la caméra</button>
        <button class="btn" id="captureBtn" disabled>Lire la zone</button>
        <button class="btn" id="autoBtn" disabled>Lecture auto</button>
        <select class="btn" id="camSelect" title="Caméra"></select>
      </div>
      <div class="progress"><div id="progBar"></div></div>

      <div class="settings">
        <label>Ollama <input id="endpoint" value="http://localhost:11434" size="20"></label>
        <label>Modèle <input id="model" value="glm-ocr:latest" size="13"></label>
        <span>· Glisse le laser vert pour régler la zone lue</span>
      </div>
    </section>

    <section class="card panel">
      <h2>Texte reconnu</h2>
      <div class="result" id="result"></div>
      <div class="meta">
        <span id="info">Prêt</span>
        <span id="timing">⏱ —</span>
      </div>
    </section>
  </main>

  <canvas id="grab" hidden></canvas>

  <script>
    const $ = id => document.getElementById(id);
    const video = $('video'), grab = $('grab'), stage = $('stage');
    const laser = $('laser'), mask = $('mask');
    const startBtn = $('startBtn'), captureBtn = $('captureBtn'), autoBtn = $('autoBtn');
    const camSelect = $('camSelect'), endpointEl = $('endpoint'), modelEl = $('model');
    const resultEl = $('result'), infoEl = $('info'), timingEl = $('timing');
    const dot = $('dot'), statusText = $('statusText'), progBar = $('progBar');

    const PROMPT = "Lis et retranscris fidèlement tout le texte visible dans cette image. " +
                   "Réponds uniquement avec le texte, sans commentaire.";

    let stream = null, autoTimer = null, busy = false;
    let laserFrac = 0.5; // position verticale du laser (0 = haut, 1 = bas)

    function setStatus(text, mode) { statusText.textContent = text; dot.className = 'dot' + (mode ? ' ' + mode : ''); }

    /* ---------- Laser déplaçable ---------- */
    function placeLaser() {
      const h = stage.clientHeight;
      const y = laserFrac * h;
      laser.style.top = y + 'px';
      mask.style.top = y + 'px';
      mask.style.height = (h - y) + 'px';
    }
    function startDrag(e) {
      e.preventDefault();
      const move = ev => {
        const rect = stage.getBoundingClientRect();
        const clientY = (ev.touches ? ev.touches[0].clientY : ev.clientY);
        laserFrac = Math.min(0.95, Math.max(0.05, (clientY - rect.top) / rect.height));
        placeLaser();
      };
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    }
    laser.addEventListener('pointerdown', startDrag);
    window.addEventListener('resize', placeLaser);

    /* ---------- Caméra ---------- */
    async function listCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      camSelect.innerHTML = '';
      cams.forEach((c, i) => {
        const opt = document.createElement('option');
        opt.value = c.deviceId; opt.textContent = c.label || `Caméra ${i + 1}`;
        camSelect.appendChild(opt);
      });
    }
    async function startCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      const deviceId = camSelect.value;
      const v = deviceId
        ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 960 } }
        : { width: { ideal: 1280 }, height: { ideal: 960 } };
      stream = await navigator.mediaDevices.getUserMedia({ video: v });
      video.srcObject = stream;
      await listCameras();
      placeLaser();
      setStatus('Caméra active', 'live');
      captureBtn.disabled = false; autoBtn.disabled = false;
    }

    /* ---------- Capture : uniquement AU-DESSUS du laser ---------- */
    function captureBase64() {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw) return null;
      const cropH = Math.round(vh * laserFrac); // hauteur de la zone lue
      const maxW = 1024, scale = Math.min(1, maxW / vw);
      grab.width = Math.round(vw * scale);
      grab.height = Math.round(cropH * scale);
      // dessine seulement la portion haute (source 0..cropH -> destination pleine)
      grab.getContext('2d').drawImage(video, 0, 0, vw, cropH, 0, 0, grab.width, grab.height);
      return grab.toDataURL('image/jpeg', 0.85).split(',')[1];
    }

    async function recognize() {
      if (busy || !stream) return;
      const b64 = captureBase64();
      if (!b64) return;
      busy = true;
      const t0 = performance.now();
      setStatus('Lecture en cours…', 'busy');
      progBar.style.width = '15%';
      resultEl.textContent = '';
      try {
        const res = await fetch(endpointEl.value.replace(/\/$/, '') + '/api/generate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: modelEl.value, prompt: PROMPT, images: [b64], stream: true })
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '', text = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf('\n')) >= 0) {
            const line = buf.slice(0, nl).trim(); buf = buf.slice(nl + 1);
            if (!line) continue;
            const obj = JSON.parse(line);
            if (obj.response) { text += obj.response; resultEl.textContent = text; }
            progBar.style.width = '70%';
          }
        }
        resultEl.textContent = text.trim() || '(aucun texte détecté)';
        timingEl.textContent = '⏱ ' + ((performance.now() - t0) / 1000).toFixed(1) + 's';
        infoEl.textContent = text.trim().length + ' caractères';
        setStatus('Caméra active', 'live');
      } catch (e) {
        resultEl.textContent = e.message.includes('Failed to fetch')
          ? "Connexion à Ollama impossible (CORS ?). Lance la page via ./start.sh."
          : 'Erreur : ' + e.message;
        setStatus('Erreur', 'err');
      } finally {
        progBar.style.width = '0%';
        busy = false;
      }
    }

    function toggleAuto() {
      if (autoTimer) {
        clearInterval(autoTimer); autoTimer = null;
        autoBtn.classList.remove('toggle-on'); autoBtn.textContent = 'Lecture auto';
      } else {
        recognize(); autoTimer = setInterval(recognize, 3000);
        autoBtn.classList.add('toggle-on'); autoBtn.textContent = 'Lecture auto · ON';
      }
    }

    startBtn.addEventListener('click', async () => {
      try {
        startBtn.disabled = true;
        await startCamera();
        startBtn.textContent = 'Redémarrer la caméra';
      } catch (e) { setStatus('Accès caméra refusé', 'err'); }
      finally { startBtn.disabled = false; }
    });
    captureBtn.addEventListener('click', recognize);
    autoBtn.addEventListener('click', toggleAuto);
    camSelect.addEventListener('change', () => stream && startCamera());

    placeLaser();
    navigator.mediaDevices?.enumerateDevices && listCameras().catch(() => {});
  </script>
</body>
</html>
